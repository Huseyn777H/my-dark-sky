services:
  - type: web
    name: my-dark-sky
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: FLASK_SECRET
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
