<header class="flex justify-between items-center py-6 mb-8 border-b border-slate-800">
    <div class="flex items-center gap-2">
        <div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
        <a href="/" class="text-xl font-black tracking-tighter hover:text-blue-400 transition-colors">
            MY DARK SKY
        </a>
    </div>

    <form action="/search" method="POST" class="relative hidden md:block">
        <input 
            type="text" 
            name="city" 
            placeholder="Search city..." 
            class="bg-slate-900 border border-slate-800 rounded-full px-5 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none w-64 transition-all"
            required
        >
        <button type="submit" class="absolute right-3 top-2 text-slate-500 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </button>
    </form>
</header>
